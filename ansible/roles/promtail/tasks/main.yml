---

- name: Install extraction tools
  become: true
  ansible.builtin.package:
    name:
      - unzip
      - tar
      - gzip
      - bzip2
      - xz
    state: present

- name: Create promtail user
  ansible.builtin.user:
    name: promtail
    system: yes
    shell: /sbin/nologin

- name: Create directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: promtail
    group: promtail
    mode: '0755'
  loop:
    - /etc/promtail
    - /var/lib/promtail

- name: Download Promtail
  ansible.builtin.get_url:
    url: https://github.com/grafana/loki/releases/latest/download/promtail-linux-amd64.zip
    dest: /tmp/promtail.zip

- name: Extract Promtail
  ansible.builtin.unarchive:
    src: /tmp/promtail.zip
    dest: /usr/local/bin/
    remote_src: yes

- name: Rename binary
  ansible.builtin.command: mv /usr/local/bin/promtail-linux-amd64 /usr/local/bin/promtail
  args:
    creates: /usr/local/bin/promtail

- name: Set permissions
  ansible.builtin.file:
    path: /usr/local/bin/promtail
    owner: promtail
    group: promtail
    mode: '0755'

- name: Deploy config
  ansible.builtin.template:
    src: promtail-config.yml.j2
    dest: /etc/promtail/promtail.yaml
    owner: promtail
    group: promtail
    mode: '0644'
  notify: Restart promtail

- name: Deploy systemd service
  ansible.builtin.template:
    src: promtail.service.j2
    dest: /etc/systemd/system/promtail.service
  notify: Restart promtail

- name: Reload systemd
  ansible.builtin.command: systemctl daemon-reload

- name: Enable and start Promtail
  ansible.builtin.systemd:
    name: promtail
    state: started
    enabled: yes
