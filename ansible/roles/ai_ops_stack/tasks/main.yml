---
- name: Bootstrap PyYAML and Pip via raw command
  ansible.builtin.raw: dnf install -y python3-pyyaml python3-pip
  become: true
  changed_when: false

- name: Install Docker SDK for Python via pip
  ansible.builtin.pip:
    name: docker
    executable: pip3
  become: true
 
- name: Create runtime directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
  loop:
    - /opt/ai-ops/prometheus
    - /opt/ai-ops/loki
    - /opt/ai-ops/grafana
      

- name: Ensure base directory exists
  ansible.builtin.file:
    path: /opt/ai-ops
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Fix Loki permissions
  ansible.builtin.file:
    path: /opt/ai-ops/loki
    owner: 10001
    group: 10001
    recurse: yes

- name: Fix Grafana permissions
  ansible.builtin.file:
    path: /opt/ai-ops/grafana
    owner: 472
    group: 472
    recurse: yes

- name: Fix Prometheus permissions
  ansible.builtin.file:
    path: /opt/ai-ops/prometheus
    owner: 65534
    group: 65534
    recurse: yes

- name: Copy docker-compose.yml
  ansible.builtin.copy:
    src: docker-compose.yml
    dest: /opt/ai-ops/docker-compose.yml

- name: Copy Prometheus config
  ansible.builtin.copy:
    src: prometheus-config/
    dest: /opt/ai-ops/prometheus-config/


- name: Create Alertmanager config directory
  ansible.builtin.file:
    path: /opt/ai-ops/alertmanager-config
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Deploy Alertmanager configuration from role template
  template:
    src: alertmanager.yml.j2
    dest: /opt/ai-ops/alertmanager-config/alertmanager.yml
    owner: root
    group: root
    mode: '0644'
  notify: restart alertmanager      

- name: Copy Loki config
  ansible.builtin.copy:
    src: loki-config/
    dest: /opt/ai-ops/loki-config/

- name: Copy Promtail config
  ansible.builtin.copy:
    src: promtail/
    dest: /opt/ai-ops/promtail/

- name: Start AI-Ops stack
  ansible.builtin.shell: docker compose up -d
  args:
    chdir: /opt/ai-ops

- name: Restart AI-Ops stack
  ansible.builtin.shell: docker compose down && docker compose up -d
  args:
    chdir: /opt/ai-ops

- name: Create Grafana provisioning directory
  ansible.builtin.file:
    path: /opt/ai-ops/grafana/provisioning/datasources
    state: directory
    owner: 472
    group: 472
    mode: '0755'

- name: Copy datasource config
  ansible.builtin.copy:
    src: grafana/provisioning/datasources/datasource.yml
    dest: /opt/ai-ops/grafana/provisioning/datasources/datasource.yml
    owner: 472
    group: 472
    mode: '0644'      

