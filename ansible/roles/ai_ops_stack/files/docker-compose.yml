version: '3.8'

services:

  prometheus:
    image: prom/prometheus:latest
    container_name: ai-ops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus-config:/etc/prometheus
      - ./prometheus:/prometheus
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: ai-ops-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager-config:/etc/alertmanager
    command:
    - '--config.file=/etc/alertmanager/alertmanager.yml'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: ai-ops-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning 
      - /opt/grafana/ldap.toml:/etc/grafana/ldap.toml
    
    environment:
      - GF_AUTH_LDAP_ENABLED=true
      - GF_AUTH_LDAP_CONFIG_FILE=/etc/grafana/ldap.toml

       # 🔥 ADD THESE
      - GF_LOG_LEVEL=debug
      - GF_AUTH_LDAP_VERBOSE_LOGGING=true 
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: ai-ops-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config:/etc/loki
      - ./loki:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: ai-ops-promtail
    volumes:
      - ./promtail:/etc/promtail
      - /var/log:/var/log
    command: -config.file=/etc/promtail/promtail-config.yaml
    restart: unless-stopped

  proxmox-exporter:
    image: prompve/prometheus-pve-exporter
    container_name: proxmox-exporter
    restart: unless-stopped
    ports:
      - "9221:9221"
    environment:
      - PVE_HOST=192.168.0.108
      - PVE_USER=prometheus@pve
      - PVE_TOKEN_NAME=prom-token
      - PVE_TOKEN_VALUE=ec70db6c-5735-4154-abd8-c6459eafd537
      - PVE_VERIFY_SSL=false
