global:
  scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "ai-ops-alertmanager:9093"    

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node
    static_configs:
      - targets:
          - 192.168.0.112:9100
          - 192.168.0.111:9100
          - 192.168.0.114:9100
          - 192.168.0.108:9100
          - 192.168.0.115:9100

