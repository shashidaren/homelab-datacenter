- name: Generate password hashes
  shell: slappasswd -s {{ item.password }}
  loop: "{{ ldap_users }}"
  register: user_passwords

- name: Create users LDIF
  template:
    src: users.ldif.j2
    dest: /tmp/users.ldif

- name: Apply users
  command: >
    ldapadd -x -D "{{ ldap_admin_dn }}"
    -w "{{ ldap_admin_password }}"
    -f /tmp/users.ldif
  register: user_add
  failed_when:
    - user_add.rc != 0
    - "'Already exists' not in user_add.stderr"
