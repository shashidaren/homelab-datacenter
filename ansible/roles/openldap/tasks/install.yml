---
- name: Enable CRB repository
  ansible.builtin.dnf:
    name: "dnf-command(config-manager)"
    state: present

- name: Enable CRB and Plus repositories
  ansible.builtin.shell: |
    dnf config-manager --set-enabled crb
    dnf config-manager --set-enabled plus
  changed_when: false

- name: Install EPEL repository
  ansible.builtin.dnf:
    name: epel-release
    state: present

- name: Optimize DNF for your lab network
  ansible.builtin.lineinfile:
    path: /etc/dnf/dnf.conf
    line: "max_parallel_downloads=10"
    state: present
    create: yes

- name: Install OpenLDAP packages
  ansible.builtin.dnf:
    name:
      - openldap
      - openldap-servers
      - openldap-clients
      - python3-ldap  # Added so your other LDAP modules work!
    state: present

- name: Enable and start slapd
  ansible.builtin.systemd:
    name: slapd
    enabled: yes
    state: started
