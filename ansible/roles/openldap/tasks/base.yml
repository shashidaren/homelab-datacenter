- name: Check if base DN exists
  command: ldapsearch -x -b "{{ ldap_base_dn }}"
  register: base_check
  failed_when: base_check.rc not in [0, 32]
  changed_when: false

- name: Create base LDIF
  template:
    src: base.ldif.j2
    dest: /tmp/base.ldif


- name: Add base DN
  command: >
    ldapadd -x -D "{{ ldap_admin_dn }}"
    -w "{{ ldap_admin_password }}"
    -f /tmp/base.ldif
  when: base_check.rc == 32
  register: base_add
  failed_when:
    - base_add.rc != 0
    - "'Already exists' not in base_add.stderr"
